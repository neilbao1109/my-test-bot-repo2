name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check clawfs tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install -U pip
          pip install -e ".[test,azure,s3,gcs]"
      - name: Smoke import azure + s3 + gcs backends
        run: python -c "from clawfs.storage import AzureBlobStorage, S3Storage, GCSStorage; print('ok')"
      - name: Pytest
        run: pytest tests/ -x -q

  ts-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: npm run build
      - run: npm test

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.20.2 }
      - name: helm lint
        run: helm lint charts/clawfs
      - name: helm template (3 backends)
        run: |
          helm template t charts/clawfs --set apiTokens=devtoken > /tmp/local.yaml
          helm template t charts/clawfs --set apiTokens=devtoken --set backend=s3 --set s3.bucket=b --set s3.accessKeyId=a --set s3.secretAccessKey=b > /tmp/s3.yaml
          helm template t charts/clawfs --set apiTokens=devtoken --set backend=azure --set azure.container=c --set azure.connectionString=cs > /tmp/azure.yaml
          wc -l /tmp/*.yaml
      - uses: helm/kind-action@v1
        with: { cluster_name: clawfs-smoke }
      - name: Build & load image
        run: |
          docker build -t clawfs:ci .
          kind load docker-image clawfs:ci --name clawfs-smoke
      - name: helm install + e2e
        run: |
          helm install clawfs charts/clawfs \
            --set image.repository=clawfs --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set apiTokens=smoketoken \
            --set local.persistence.size=1Gi
          kubectl wait --for=condition=available --timeout=180s deploy/clawfs-clawfs
          kubectl port-forward svc/clawfs-clawfs 18000:80 &
          sleep 4
          curl -fsS http://127.0.0.1:18000/healthz
          echo hello > /tmp/p.txt
          HASH=$(curl -fsS -X PUT -H "Authorization: Bearer smoketoken" -F file=@/tmp/p.txt http://127.0.0.1:18000/blobs | python -c 'import json,sys;print(json.load(sys.stdin)["hash"])')
          curl -fsS -H "Authorization: Bearer smoketoken" http://127.0.0.1:18000/blobs/$HASH -o /tmp/g.txt
          diff /tmp/p.txt /tmp/g.txt
          echo "K8S ROUNDTRIP OK"

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, ts-sdk, helm]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (PR / non-main: no push)
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: clawfs:ci
      - name: Build & push (main only)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/clawfs:latest
            ghcr.io/${{ github.repository_owner }}/clawfs:${{ github.sha }}
