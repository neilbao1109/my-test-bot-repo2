{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawfs.tokenSecretName" . }}
  labels: {{- include "clawfs.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLAWFS_API_TOKENS: {{ .Values.apiTokens | default "" | quote }}
{{- end }}
{{- if and (eq .Values.backend "s3") (not .Values.s3.existingSecret) (or .Values.s3.accessKeyId .Values.s3.secretAccessKey) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawfs.fullname" . }}-s3
  labels: {{- include "clawfs.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | quote }}
{{- end }}
{{- if and (eq .Values.backend "azure") (not .Values.azure.existingSecret) .Values.azure.connectionString }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawfs.fullname" . }}-azure
  labels: {{- include "clawfs.labels" . | nindent 4 }}
type: Opaque
stringData:
  AZURE_STORAGE_CONNECTION_STRING: {{ .Values.azure.connectionString | quote }}
{{- end }}
